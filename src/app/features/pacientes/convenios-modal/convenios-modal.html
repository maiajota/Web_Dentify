<div class="modal-overlay" role="presentation" (click)="fechar()">
    <div
        class="modal"
        role="dialog"
        aria-modal="true"
        aria-labelledby="convenios-modal-titulo"
        (click)="$event.stopPropagation()"
    >
        <div class="modal-cabecalho">
            <h2 id="convenios-modal-titulo" class="modal-titulo">Convênios do Paciente</h2>
            <button
                type="button"
                class="modal-fechar"
                aria-label="Fechar modal"
                (click)="fechar()"
            >
                <svg lucideX aria-hidden="true"></svg>
            </button>
        </div>

        <div class="modal-form">
            <app-convenios-paciente [linhas]="linhas()" />

            <div class="modal-acoes">
                <button type="button" class="botao-cancelar" (click)="fechar()">
                    Cancelar
                </button>
                <button
                    type="button"
                    class="btn-primary-sm"
                    [disabled]="linhas().invalid || salvando()"
                    (click)="salvar()"
                >
                    {{ salvando() ? 'Salvando...' : 'Salvar' }}
                </button>
            </div>
        </div>
    </div>
</div>
